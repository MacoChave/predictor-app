<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predictor Copa Mundial 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #212428;
      color: #e8f5e9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #212428;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 8px 8px 16px #15171a, -8px -8px 16px #2d3136;
    }
    .badge {
      display: inline-block;
      background: #212428;
      color: #ff6b82;
      box-shadow: inset 3px 3px 6px #15171a, inset -3px -3px 6px #2d3136;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 99px;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.7rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 0.4rem;
    }
    .subtitle {
      color: #00a86b;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .error {
      background: #212428;
      box-shadow: inset 4px 4px 8px #15171a, inset -4px -4px 8px #2d3136;
      border-left: 4px solid #c8102e;
      border-radius: 8px;
      color: #ff6b82;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .info {
      background: #212428;
      box-shadow: inset 4px 4px 8px #15171a, inset -4px -4px 8px #2d3136;
      border-left: 4px solid #00a86b;
      border-radius: 8px;
      color: #00a86b;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .teams-row {
      display: grid;
      grid-template-columns: 1fr 40px 1fr;
      gap: 0.5rem;
      align-items: end;
      margin-bottom: 2rem;
    }
    .vs {
      color: #ffd700;
      font-weight: 900;
      font-size: 1.1rem;
      text-align: center;
      padding-bottom: 0.6rem;
      text-shadow: 2px 2px 4px #15171a, -2px -2px 4px #2d3136;
    }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #00a86b;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
      margin-left: 0.5rem;
    }
    .search-wrap { position: relative; }
    .search-wrap input[type="text"] {
      width: 100%;
      padding: 0.8rem 1rem;
      background: #212428;
      border: none;
      border-radius: 12px 12px 0 0;
      color: #e8f5e9;
      font-size: 0.85rem;
      outline: none;
      box-shadow: inset 4px 4px 8px #15171a, inset -4px -4px 8px #2d3136;
      transition: all 0.3s ease;
    }
    .search-wrap input[type="text"]:focus { 
      box-shadow: inset 6px 6px 10px #15171a, inset -6px -6px 10px #2d3136;
    }
    select {
      width: 100%;
      padding: 0.6rem;
      background: #212428;
      border: none;
      border-radius: 0 0 12px 12px;
      color: #e8f5e9;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
      max-height: 160px;
      box-shadow: inset 4px 4px 8px #15171a, inset -4px -4px 8px #2d3136;
    }
    select option { background: #212428; padding: 0.5rem; border-radius: 6px; margin-bottom: 2px; }
    select option:checked { background: #15171a; color: #00a86b; font-weight: bold; }
    button[type="submit"] {
      width: 100%;
      padding: 1rem;
      background: #212428;
      color: #00a86b;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 1px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 6px 6px 12px #15171a, -6px -6px 12px #2d3136;
      transition: all 0.2s ease;
    }
    button[type="submit"]:hover { color: #00cf84; }
    button[type="submit"]:active { 
      box-shadow: inset 4px 4px 8px #15171a, inset -4px -4px 8px #2d3136;
      color: #008756;
    }
    .footer {
      margin-top: 2rem;
      font-size: 0.85rem;
      text-align: center;
    }
    .footer a { 
      display: inline-block;
      color: #00a86b; 
      text-decoration: none; 
      padding: 0.6rem 1.2rem;
      border-radius: 12px;
      box-shadow: 4px 4px 8px #15171a, -4px -4px 8px #2d3136;
      transition: all 0.2s ease;
    }
    .footer a:hover { 
      box-shadow: inset 3px 3px 6px #15171a, inset -3px -3px 6px #2d3136;
      color: #00cf84;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Mundial 2026</span>
    <h1>Predictor de Resultados</h1>
    <p class="subtitle">Selecciona dos selecciones para ver la predicción H2H</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    {% if info %}
      <div class="info">{{ info }}</div>
    {% endif %}

    <form method="POST" action="/predict">
      <div class="teams-row">
        <div>
          <label for="search_a">Equipo A</label>
          <div class="search-wrap">
            <input type="text" id="search_a" placeholder="Filtrar..." oninput="filterSelect('search_a','team_a')">
            <select name="team_a" id="team_a" size="5">
              {% for team in teams %}
                <option value="{{ team }}">{{ team }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="vs">VS</div>
        <div>
          <label for="search_b">Equipo B</label>
          <div class="search-wrap">
            <input type="text" id="search_b" placeholder="Filtrar..." oninput="filterSelect('search_b','team_b')">
            <select name="team_b" id="team_b" size="5">
              {% for team in teams %}
                <option value="{{ team }}">{{ team }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
      </div>
      <button type="submit">Predecir resultado</button>
    </form>

    <p class="footer">
      <a href="/refresh">Recargar datos desde Dropbox</a>
    </p>
  </div>

  <script>
    const allOptions = {};
    ['team_a', 'team_b'].forEach(id => {
      const sel = document.getElementById(id);
      allOptions[id] = Array.from(sel.options).map(o => ({ value: o.value, text: o.text }));
    });

    function filterSelect(inputId, selectId) {
      const q = document.getElementById(inputId).value.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
      const sel = document.getElementById(selectId);
      sel.innerHTML = '';
      allOptions[selectId]
        .filter(o => o.text.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').includes(q))
        .forEach(o => {
          const opt = document.createElement('option');
          opt.value = o.value;
          opt.text = o.text;
          sel.appendChild(opt);
        });
    }
  </script>
</body>
</html>
