<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predictor Copa Mundial 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1f12;
      color: #e8f5e9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #1a2e1f;
      border: 1px solid #2e5235;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .badge {
      display: inline-block;
      background: #c8102e;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 99px;
      margin-bottom: 0.75rem;
    }
    h1 {
      font-size: 1.7rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 0.4rem;
    }
    .subtitle {
      color: #6dbf7e;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .error {
      background: rgba(200,16,46,0.15);
      border: 1px solid #c8102e;
      border-radius: 8px;
      color: #ff6b82;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .info {
      background: rgba(109,191,126,0.12);
      border: 1px solid #2e7d32;
      border-radius: 8px;
      color: #6dbf7e;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .teams-row {
      display: grid;
      grid-template-columns: 1fr 40px 1fr;
      gap: 0.5rem;
      align-items: end;
      margin-bottom: 1.5rem;
    }
    .vs {
      color: #ffd700;
      font-weight: 900;
      font-size: 1.1rem;
      text-align: center;
      padding-bottom: 0.6rem;
    }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #6dbf7e;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .search-wrap { position: relative; }
    .search-wrap input[type="text"] {
      width: 100%;
      padding: 0.5rem 0.6rem;
      background: #0d1f12;
      border: 1px solid #2e5235;
      border-radius: 6px 6px 0 0;
      color: #e8f5e9;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input[type="text"]:focus { border-color: #6dbf7e; }
    select {
      width: 100%;
      padding: 0.6rem 0.6rem;
      background: #0d1f12;
      border: 1px solid #2e5235;
      border-top: none;
      border-radius: 0 0 6px 6px;
      color: #e8f5e9;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
      max-height: 160px;
    }
    select:focus { border-color: #6dbf7e; }
    select option { background: #1a2e1f; }
    button[type="submit"] {
      width: 100%;
      padding: 0.85rem;
      background: #006341;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button[type="submit"]:hover { background: #007d50; }
    button[type="submit"]:active { transform: scale(0.98); }
    .footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #3a5940;
      text-align: center;
    }
    .footer a { color: #4a7a50; text-decoration: none; }
    .footer a:hover { color: #6dbf7e; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Mundial 2026</span>
    <h1>Predictor de Resultados</h1>
    <p class="subtitle">Selecciona dos selecciones para ver la predicción H2H</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    {% if info %}
      <div class="info">{{ info }}</div>
    {% endif %}

    <form method="POST" action="/predict">
      <div class="teams-row">
        <div>
          <label for="search_a">Equipo A</label>
          <div class="search-wrap">
            <input type="text" id="search_a" placeholder="Filtrar..." oninput="filterSelect('search_a','team_a')">
            <select name="team_a" id="team_a" size="5">
              {% for team in teams %}
                <option value="{{ team }}">{{ team }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="vs">VS</div>
        <div>
          <label for="search_b">Equipo B</label>
          <div class="search-wrap">
            <input type="text" id="search_b" placeholder="Filtrar..." oninput="filterSelect('search_b','team_b')">
            <select name="team_b" id="team_b" size="5">
              {% for team in teams %}
                <option value="{{ team }}">{{ team }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
      </div>
      <button type="submit">Predecir resultado</button>
    </form>

    <p class="footer">
      <a href="/refresh">Recargar datos desde Dropbox</a>
    </p>
  </div>

  <script>
    const allOptions = {};
    ['team_a', 'team_b'].forEach(id => {
      const sel = document.getElementById(id);
      allOptions[id] = Array.from(sel.options).map(o => ({ value: o.value, text: o.text }));
    });

    function filterSelect(inputId, selectId) {
      const q = document.getElementById(inputId).value.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
      const sel = document.getElementById(selectId);
      sel.innerHTML = '';
      allOptions[selectId]
        .filter(o => o.text.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').includes(q))
        .forEach(o => {
          const opt = document.createElement('option');
          opt.value = o.value;
          opt.text = o.text;
          sel.appendChild(opt);
        });
    }
  </script>
</body>
</html>
